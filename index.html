<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Voice Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }

    /* ── Floating bubble ── */
    #bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      cursor: pointer;
      overflow: hidden;
      border: 2.5px solid rgba(255,255,255,0.15);
      transition: transform 0.18s, border-color 0.18s;
      z-index: 9999;
    }
    #bubble:hover { transform: scale(1.08); border-color: rgba(255,255,255,0.35); }
    #bubble.listening { border-color: #6366f1; animation: pulse-ring 1.4s ease-out infinite; }
    #bubble.speaking  { border-color: #34d399; animation: pulse-ring 0.9s ease-out infinite; }

    #bubble img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ripple ring */
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0px rgba(99,102,241,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0px rgba(99,102,241,0); }
    }
    #bubble.speaking {
      animation: pulse-ring-green 0.9s ease-out infinite;
    }
    @keyframes pulse-ring-green {
      0%   { box-shadow: 0 0 0 0px rgba(52,211,153,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(52,211,153,0); }
      100% { box-shadow: 0 0 0 0px rgba(52,211,153,0); }
    }

    /* ── Setup popup ── */
    #popup {
      position: fixed;
      bottom: 104px;
      right: 28px;
      width: 220px;
      background: #1c1c1e;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px;
      z-index: 9998;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    #popup.open { display: flex; }

#btn-go {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #btn-go:hover { opacity: 0.88; }
    #btn-go:disabled { opacity: 0.45; cursor: default; }

    #status-text {
      font-size: 12px;
      color: #555;
      text-align: center;
    }
    #status-text.active { color: #34d399; }
    #status-text.error  { color: #f87171; }

    #btn-disconnect {
      width: 100%;
      padding: 8px;
      background: transparent;
      color: #666;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: none;
    }
    #btn-disconnect:hover { color: #f87171; border-color: #f87171; }

    #audio-sink { display: none; }

    #debug-log {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 12px;
      color: #aaa;
      max-height: 180px;
      overflow-y: auto;
      z-index: 9999;
    }
    #debug-log div { margin: 2px 0; }
    #debug-log .ok  { color: #34d399; }
    #debug-log .err { color: #f87171; }
  </style>
</head>
<body>

  <!-- Replace src with any face image URL, or a local path -->
  <div id="bubble" title="Talk to agent">
    <img src="https://api.dicebear.com/7.x/micah/svg?seed=agent&backgroundColor=4f46e5" alt="Agent" />
  </div>

  <div id="popup">
    <button id="btn-go">Connect &amp; Talk</button>
    <p id="status-text">Click to connect to the voice agent</p>
    <button id="btn-disconnect">Disconnect</button>
  </div>

  <div id="debug-log"></div>
  <div id="audio-sink"></div>

<script>
function dbg(msg, cls = "") {
  const el = document.getElementById("debug-log");
  const line = document.createElement("div");
  if (cls) line.className = cls;
  line.textContent = new Date().toLocaleTimeString() + " " + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}

if (typeof LivekitClient === "undefined") {
  dbg("ERROR: LivekitClient not loaded — check network/CDN", "err");
} else {
  dbg("LivekitClient loaded ✓", "ok");
}

const { Room, RoomEvent, Track, RemoteParticipant } = LivekitClient;

const bubble    = document.getElementById("bubble");
const popup     = document.getElementById("popup");
const btnGo     = document.getElementById("btn-go");
const btnDisco  = document.getElementById("btn-disconnect");
const statusEl  = document.getElementById("status-text");
const audioSink = document.getElementById("audio-sink");

let room = null;
let connected = false;
let tUserStopped = 0;  // timestamp when local user last stopped speaking

// ── Toggle popup on bubble click ────────────────────────────────────────────
bubble.addEventListener("click", () => {
  if (connected) return;
  popup.classList.toggle("open");
});

// ── Connect ──────────────────────────────────────────────────────────────────
btnGo.addEventListener("click", async () => {
  // Unlock audio playback — must happen inside a user gesture
  try { await new AudioContext().resume(); } catch(_) {}

  btnGo.disabled = true;
  setStatus("Fetching credentials…");
  dbg("Fetching /token…");

  let url, token;
  try {
    const resp = await fetch("/token");
    if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
    ({ url, token } = await resp.json());
    dbg("Token OK, URL: " + url, "ok");
  } catch (e) {
    dbg("Token fetch failed: " + e.message, "err");
    setStatus("Could not get token: " + e.message, "error");
    btnGo.disabled = false;
    return;
  }

  setStatus("Connecting…");
  room = new Room();

  room.on(RoomEvent.ActiveSpeakersChanged, (speakers) => {
    const localTalking = speakers.some(s => s === room.localParticipant);
    const agentTalking = speakers.some(s => s instanceof RemoteParticipant);

    if (!localTalking && tUserStopped === 0) {
      tUserStopped = performance.now();
    }
    if (localTalking) {
      tUserStopped = 0;  // reset if user speaks again
    }

    bubble.className = agentTalking ? "speaking" : (connected ? "listening" : "");
  });

  room.on(RoomEvent.ParticipantConnected, (p) => {
    dbg("Participant joined: " + p.identity, "ok");
  });

  room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
    dbg("Track subscribed: " + track.kind + " from " + participant.identity, "ok");
    if (track.kind === Track.Kind.Audio) {
      if (tUserStopped > 0) {
        const rtt = ((performance.now() - tUserStopped) / 1000).toFixed(2);
        dbg(`[TIMER] End-to-end latency: ${rtt}s`, "ok");
        tUserStopped = 0;
      }
      const el = track.attach();
      el.autoplay = true;
      audioSink.appendChild(el);
      el.play().catch((e) => dbg("play() blocked: " + e.message, "err"));
    }
  });

  room.on(RoomEvent.TrackUnsubscribed, (track) => track.detach());

  room.on(RoomEvent.Disconnected, () => {
    connected = false;
    bubble.className = "";
    popup.classList.add("open");
    btnGo.disabled = false;
    btnDisco.style.display = "none";
    dbg("Room disconnected");
    setStatus("Disconnected — click to reconnect");
  });

  try {
    dbg("Connecting to room…");
    await room.connect(url, token);
    dbg("Room connected ✓ — " + room.name, "ok");
    connected = true;
    popup.classList.remove("open");
    bubble.className = "listening";
    btnDisco.style.display = "block";
    setStatus("Enabling microphone…");
    dbg("Requesting mic…");
    if (!navigator.mediaDevices) {
      throw new Error("Mic blocked — open via http://localhost:" + location.port + " (not IP address). Browsers require HTTPS or localhost for microphone.");
    }
    await room.localParticipant.setMicrophoneEnabled(true);
    dbg("Mic enabled ✓", "ok");
    setStatus("Connected — speak now", "active");
  } catch (e) {
    dbg("Connect error: " + e.message, "err");
    setStatus("Failed: " + e.message, "error");
    btnGo.disabled = false;
  }
});

// ── Disconnect ───────────────────────────────────────────────────────────────
btnDisco.addEventListener("click", async () => {
  if (room) await room.disconnect();
});

function setStatus(msg, cls = "") {
  statusEl.textContent = msg;
  statusEl.className = cls;
}
</script>
</body>
</html>
